name: face_liveness_demo
description: "Face liveness pre-check demo with on-device ML gates."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.1
  meta: ^1.15.0
  path_provider: ^2.1.4
  supabase_flutter: ^2.8.0
  package_info_plus: ^8.1.0
  device_info_plus: ^11.0.0
  uuid: ^4.5.0
  fl_chart: ^0.69.0
  share_plus: ^10.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
